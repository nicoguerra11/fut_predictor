services:
  - type: web
    name: fut_predictor
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && python data/fetch_data.py && python model/train.py
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FOOTBALL_DATA_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: MCMC_CHAINS
        value: "2"
      - key: MCMC_DRAWS
        value: "500"
      - key: MCMC_TUNE
        value: "500"
